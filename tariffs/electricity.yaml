schema_version: 1
last_verified: 2026-06-06
verified_by: sophiezhen
notes: |
  All rates are c/kWh INC 9% residential VAT.
  Standing charges are annual EUR INC VAT.
  PSO levy (€1.46/month ex VAT, applied to every electricity account) is
  added by the simulator; do NOT include it in standing_eur_per_year here.

  Each plan's `category` field indicates how the simulator should treat it:
    new_customer_offer  - listed for switching consideration (default)
    post_hike_standard  - the "do nothing past discount expiry" trap
    discontinued        - kept for traceability, not offered for new sign-ups

  v0 catalogue covers the big six (EI, BG, Energia, SSE, Flogas, Yuno) plus
  Pinergy. Catalogue expansion to full smart-meter plan range is in progress.

