    rate_cpkwh: 25.0
    source:
      url: solarinfo.ie/electricity-providers
      verified_on: 2026-05-06
      confidence: THIRD_PARTY
    notes: |
      Highest published standard CEG rate. Pinergy gives 30 days' notice of a
      rate change. Cross-checked on greentechreview.com (June 2026).

