schema_version: 1
last_verified: 2026-06-10
verified_by: sophiezhen
notes: |
  Clean Export Guarantee (CEG) microgeneration export rates, c/kWh INC VAT.

  These are each supplier's STANDARD CEG rate paid to domestic microgenerators
  (e.g. solar PV) for electricity exported to the grid.

  IMPORT AND EXPORT MUST BE WITH THE SAME SUPPLIER (CRU microgeneration scheme
  rule). The simulator therefore nets export revenue against import cost per
  supplier and never mixes suppliers. `supplier` is matched by exact name to
  the import catalogue in electricity.yaml.

  TAX: export income is exempt up to EUR 400/year per named account holder
  (EUR 800 for a jointly-named bill), under TCA 1997 s216D, in force
  2024-01-01 to 2028-12-28 (extended in Budget 2026). Income above the
  threshold is taxed at the microgenerator's marginal rate. The exemption is a
  cap on the EUR amount received (exported kWh * rate), not on kWh.

  PREMIUM / PARTNER RATES ARE EXCLUDED from the modelled rate. SSE Airtricity's
  Activ8 tier (~32c year 1, ~27c year 2) and Yuno's ~29c rate require installing
  through a specific partner installer and do not apply to a customer who simply
  switches supplier. They are recorded in notes for traceability only.

  CONFIDENCE: Energia is FACT (confirmed on the supplier's own page). The others
  are THIRD_PARTY (two independent comparison trackers agree: solarinfo.ie
  verified 2026-05-06 and greentechreview.com June 2026). Confirming each on the
  supplier's own page is a follow-up before these are treated as FACT.

rates:
