id: dublin_2person_mixed
label: Dublin 2-person mixed-schedule household (sample)
source: |
  Derived from 250 days of ESB Networks half-hour HDF readings (Jul 2025 -
  Mar 2026) for one anonymised Dublin 2-person household with gas central
  heating, no EV (pre-EV-installation period), no solar.

  This is a SINGLE-HOUSEHOLD SAMPLE, not a published CRU/SEAI standard
  residential load profile. It is provided as a usable default for v0
  while we research access to an authoritative public profile.
  Replace with a CRU/SEAI Standard Load Profile when one is available.

# Average kWh/day for each hour of the day, split by weekday vs weekend.
# Multiply each value by 365 * 5/7 (weekday) or 365 * 2/7 (weekend) to get
# annual kWh in that hour bucket. Sum of weekday values = 10.33 kWh/day,
# sum of weekend values = 10.39 kWh/day, annualised ~ 3,777 kWh/year.
