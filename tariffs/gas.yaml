schema_version: 1
last_verified: 2026-06-06
verified_by: sophiezhen
notes: |
  All rates are c/kWh INC 9% residential VAT.
  Standing charges are annual EUR INC VAT.
  Carbon tax (~€1.25c/kWh inc VAT) is added by the simulator; do NOT
  include it in rate_cpkwh_inc_vat here.

  Many suppliers offer different gas discounts depending on whether the
  customer takes their dual-fuel bundle. We record EACH discount tier as a
  separate plan and use `requires_dual_fuel_with` to indicate which
  electricity plan unlocks it.

plans:

